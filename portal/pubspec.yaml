# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - images/backgrounds/
    - images/challenge_default_images/
    - images/generic_logos/
    - images/maps/
    - images/other/
    - images/pdfs/
    - images/map_pins/red/
    - images/map_pins/orange/
    - images/map_pins/yellow/
    - images/map_pins/green/
    - images/map_pins/teal/
    - images/map_pins/baby_blue/
    - images/map_pins/blue/
    - images/map_pins/purple/
    - images/map_pins/pink/
    - images/progress_indicators/forms/

  fonts:
    - family: AvenirNextHeavy
      fonts:
        - asset: fonts/AvenirNext-Heavy.ttf
        - asset: fonts/AvenirNext-HeavyItalic.ttf
          style: italic

    - family: AvenirNextBold
      fonts:
        - asset: fonts/AvenirNext-Bold.ttf
        - asset: fonts/AvenirNext-BoldItalic.ttf
          style: italic

    - family: AvenirNext
      fonts:
        - asset: fonts/AvenirNext-Regular.ttf
        - asset: fonts/AvenirNext-Italic.ttf
          style: italic

    - family: AvenirNextRegular
      fonts:
        - asset: fonts/AvenirNext-Regular.ttf
        - asset: fonts/AvenirNext-Italic.ttf
          style: italic


    - family: AvenirNextUltraLight
      fonts:
        - asset: fonts/AvenirNext-UltraLight.ttf
        - asset: fonts/AvenirNext-UltraLightItalic.ttf
          style: italic


    - family: AvenirNextMedium
      fonts:
        - asset: fonts/AvenirNext-Medium.ttf
        - asset: fonts/AvenirNext-MediumItalic.ttf
          style: italic

    - family: AvenirNextCondensed
      fonts:
        - asset: fonts/AvenirNextCondensed-Heavy.ttf
        - asset: fonts/AvenirNextCondensed-HeavyItalic.ttf
        - asset: fonts/AvenirNextCondensed-Italic.ttf
        - asset: fonts/AvenirNextCondensed-Regular.ttf
        - asset: fonts/AvenirNextCondensed-UltraLight.ttf
        - asset: fonts/AvenirNextCondensed-UltraLightItalic.ttf

    - family: AvenirNextCondensedMedium
      fonts:
        - asset: fonts/AvenirNextCondensed-Medium.ttf
        - asset: fonts/AvenirNextCondensed-MediumItalic.ttf
          style: italic
          
    - family: AvenirNextCondensedDemiBold
      fonts:
        - asset: fonts/AvenirNextCondensedDemiBold.ttf
        - asset: fonts/AvenirNextCondensedDemiBoldItalic.ttf
          style: italic

    - family: AvenirNextDemiBold
      fonts:
        - asset: fonts/AvenirNextDemiBold.ttf
        - asset: fonts/AvenirNextDemiBoldItalic.ttf
          style: italic
    - family: AvenirNextCondensedBold
